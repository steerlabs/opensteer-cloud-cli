name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Check Cargo version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(awk '
            /^\[package\]/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^version = / {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "Cargo.toml version $cargo_version does not match tag $GITHUB_REF_NAME." >&2
            exit 1
          fi

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="opensteer-cloud-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "$staging" release-assets
          cp "target/${target}/release/opensteer-cloud" "$staging/"
          cp "target/${target}/release/opensteer-run" "$staging/"
          cp README.md LICENSE "$staging/"
          tar -C "$staging" -czf "release-assets/${archive}" .
          cd release-assets
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensteer-cloud-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -name 'opensteer-cloud-*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -type f -name 'opensteer-cloud-*.tar.gz.sha256' -exec cat {} \; > release-assets/opensteer-cloud-checksums.txt
          ls -la release-assets

      - name: Attest release archives
        uses: actions/attest@v4
        with:
          subject-path: "release-assets/opensteer-cloud-*.tar.gz"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "$tag" \
              --notes "Opensteer Cloud CLI $tag"
          fi
